version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: crypto_rabbitmq
    ports:
      # 5672: Der Standard-Port für die Code-Kommunikation (AMQP)
      - "5672:5672"
      # 15672: Das Web-Dashboard für dich zum Reinschauen
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data: