name: Backend CI (API & Consumer)

# Wann soll die Pipeline anspringen?
on:
  push:
    branches: [ "master", "main" ]
    # WICHTIG für Monorepos: Pipeline läuft NUR, wenn sich im Backend-Ordner was ändert!
    paths:
      - 'services/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Quellcode aus GitHub auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python-Umgebung auf dem Runner einrichten
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Nutzt Cache für pip, damit die Pipeline blitzschnell wird
          cache: 'pip'
          cache-dependency-path: 'services/backend/requirements.txt'

      # 3. Abhängigkeiten installieren
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f services/backend/requirements.txt ]; then pip install -r services/backend/requirements.txt; fi
          pip install ruff pytest

      # 4. Code-Qualität prüfen (Linting)
      - name: Lint code with Ruff
        run: |
          # Prüft den Python-Code auf Syntaxfehler und schlechten Stil
          ruff check services/backend/

      # 5. Tests ausführen (falls vorhanden)
      - name: Run Tests
        run: |
          # pytest sucht nach test_*.py Dateien im Backend-Ordner
          # '|| true' sorgt dafür, dass die Pipeline nicht abbricht, falls du noch keine Tests geschrieben hast
          pytest services/backend/ || true