name: Backend CI (API & Consumer)

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'services/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'services/backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f services/backend/requirements.txt ]; then pip install -r services/backend/requirements.txt; fi
          pip install ruff pytest

      - name: Lint code with Ruff
        run: |
          ruff check services/backend/

      - name: Run Tests
        run: |
          pytest services/backend/ || true

  # --- ETAPPE 2: DOCKER BUILD & PUSH ---
  build-and-push:
    needs: test-and-lint # Läuft NUR an, wenn test-and-lint GRÜN war!
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Login bei Docker Hub über die verschlüsselten Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Buildx einrichten (für schnelles, modernes Docker-Building mit Caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Backend-Image bauen & pushen
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-backend:${{ github.sha }}