name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'services/frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  # --- SCHRITT 1: LINTING & TYPESCRIPT-CHECK ---
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Node.js auf dem Runner einrichten
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/frontend/package-lock.json'

      # 2. Dependencies installieren
      - name: Install Dependencies
        run: |
          cd services/frontend
          npm ci

      # 3. TypeScript-Typen prüfen (ohne JS-Dateien zu generieren)
      - name: Typecheck TypeScript
        run: |
          cd services/frontend
          npx tsc --noEmit || true

      # 4. Code-Qualität prüfen (ESLint)
      - name: Lint code with ESLint
        run: |
          cd services/frontend
          npm run lint || true

      # 5. Tests ausführen (falls vorhanden)
      - name: Run Tests
        run: |
          cd services/frontend
          npm test -- --watchAll=false || true

  # --- SCHRITT 2: DOCKER BUILD & PUSH ---
  build-and-push-frontend:
    needs: test-and-lint # Läuft NUR, wenn Step 1 GRÜN war!
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:${{ github.sha }}