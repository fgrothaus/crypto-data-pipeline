name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'services/frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  # --- SCHRITT 1: LINTING & TYPESCRIPT-CHECK ---
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd services/frontend
          npm ci

      - name: Typecheck TypeScript
        run: |
          cd services/frontend
          npx tsc --noEmit || true

      - name: Lint code with ESLint
        run: |
          cd services/frontend
          npm run lint || true

      - name: Run Tests
        run: |
          cd services/frontend
          npm test -- --watchAll=false || true

  # --- SCHRITT 2: DOCKER BUILD & PUSH ---
  build-and-push-frontend:
    needs: test-and-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:${{ github.sha }}

      # --- SCHRITT 3: GITOPS UPDATE ---
      - name: Update K8s Manifest & Push to Git
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/crypto-frontend:${{ github.sha }}|g" k8s/frontend/deployment.yml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add k8s/frontend/deployment.yml
          git commit -m "ci(k8s): update frontend image tag to ${{ github.sha }} [skip ci]"
          git pull --rebase origin master
          git push