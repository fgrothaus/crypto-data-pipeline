apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-ingestion-deployment
  namespace: crypto-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-ingestion
  template:
    metadata:
      labels:
        app: crypto-ingestion
    spec:
      containers:
      - name: ingestion-service
        image: fgrothaus1/crypto-ingestion:3757b7f54e3848f7fb5b544b6dba9fbf8b897c30
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: ingestion-config
        - secretRef:
            name: ingestion-secret # untracked file. Wird lokal mit kubectl eingebunden
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"